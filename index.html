<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KH90 Developer Console | Google Sheets Backend</title>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #010409; color: #c9d1d9; text-align: center; padding: 10px; }
        .turbo-card { background: #0d1117; border: 1px solid #30363d; padding: 25px; border-radius: 12px; max-width: 400px; margin: 20px auto; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #161b22; border: 1px solid #30363d; color: white; border-radius: 7px; box-sizing: border-box; outline: none; }
        .speed-btn { background: #238636; color: white; border: none; padding: 14px; width: 100%; border-radius: 7px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .speed-btn:hover { background: #2ea043; }
        .speed-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        #log { font-size: 14px; margin-top: 10px; color: #8b949e; font-weight: bold; }
        .badge { background: #2f81f7; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="turbo-card">
        <h2 style="color: #2f81f7; margin-bottom: 5px;">KH90 <span class="badge">SHEETS ENGINE</span></h2>
        <p style="font-size: 12px; margin-bottom: 20px; color: #8b949e;">Developer Console (No Appwrite)</p>

        <input type="text" id="dev" placeholder="Developer Name">
        <input type="text" id="app" placeholder="App/Game Name">
        
        <select id="mode" onchange="toggleInputs()">
            <option value="Android APK">Android APK (Link)</option>
            <option value="HTML5 Web">HTML5 Web App (Link)</option>
        </select>

        <input type="text" id="l-in" placeholder="Paste Download or Web Link here...">

        <button class="speed-btn" id="s-btn" onclick="blastOff()">PUBLISH TO STORE</button>
        <div id="log">Ready for KH90 Store</div>
    </div>

    <script>
        // ਆਪਣਾ Google Script Web App URL ਇੱਥੇ ਪਾਓ
        const scriptURL = 'ਤੁਹਾਡਾ_WEB_APP_URL_ਇੱਥੇ_ਪਾਓ';

        function toggleInputs() {
            // ਫਿਲਹਾਲ ਅਸੀਂ ਲਿੰਕ ਸਿਸਟਮ ਵਰਤ ਰਹੇ ਹਾਂ ਕਿਉਂਕਿ ਸ਼ੀਟ ਵਿੱਚ ਲਿੰਕ ਸੇਵ ਕਰਨਾ ਸੌਖਾ ਹੈ
        }

        async function blastOff() {
            const dev = document.getElementById('dev').value;
            const app = document.getElementById('app').value;
            const link = document.getElementById('l-in').value;
            const mode = document.getElementById('mode').value;
            const btn = document.getElementById('s-btn');
            const log = document.getElementById('log');

            if(!dev || !app || !link) return alert("ਪਲੀਜ਼ ਸਾਰੀ ਜਾਣਕਾਰੀ ਭਰੋ!");

            btn.disabled = true;
            log.innerText = "🚀 Google Sheets ਨੂੰ ਭੇਜ ਰਿਹਾ ਹੈ...";

            const gameData = {
                gameTitle: app,
                developerName: dev,
                downloadUrl: link,
                platform: mode
            };

            try {
                // ਡਾਟਾ ਨੂੰ Google Script ਰਾਹੀਂ ਸ਼ੀਟ ਵਿੱਚ ਭੇਜਣਾ
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors', // CORS ਮਸਲੇ ਤੋਂ ਬਚਣ ਲਈ
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(gameData)
                });

                log.innerHTML = "<b style='color:#3fb950'>✅ PUBLISHED TO SHEETS!</b>";
                
                // 3 ਸਕਿੰਟ ਬਾਅਦ ਪੇਜ ਰਿਫ੍ਰੈਸ਼ ਕਰੋ
                setTimeout(() => {
                    document.getElementById('dev').value = "";
                    document.getElementById('app').value = "";
                    document.getElementById('l-in').value = "";
                    btn.disabled = false;
                    log.innerText = "Ready for next upload";
                }, 3000);

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                log.innerText = "Failed.";
            }
        }
    </script>
</body>
</html>
